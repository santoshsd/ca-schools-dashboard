# Deploy CA School Dashboard to Azure App Service (Docker Container)
#
# Required GitHub Secrets:
#   AZURE_CREDENTIALS        - Service principal JSON (az ad sp create-for-rbac --sdk-auth)
#   ACR_LOGIN_SERVER         - e.g. csdacrXXXXX.azurecr.io
#   ACR_USERNAME             - ACR admin username
#   ACR_PASSWORD             - ACR admin password
#   AZURE_RESOURCE_GROUP     - e.g. ca-school-dashboard-rg
#   AZURE_APP_SERVICE_NAME   - e.g. csd-app-XXXXX
#   DATABASE_URL             - Full PostgreSQL connection string
#
# After infrastructure is provisioned (via azure/deploy.sh or Portal), set
# these secrets at: Settings > Secrets and variables > Actions

name: Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch: # manual trigger

permissions:
  contents: read

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check

  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/cadashboard:${{ github.sha }} \
                       -t ${{ secrets.ACR_LOGIN_SERVER }}/cadashboard:latest .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/cadashboard:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/cadashboard:latest

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_APP_SERVICE_NAME }}
          images: ${{ secrets.ACR_LOGIN_SERVER }}/cadashboard:${{ github.sha }}

      - name: Run database migrations
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Push schema
        run: npx drizzle-kit push
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Health check
        run: |
          sleep 15
          APP_URL="https://${{ secrets.AZURE_APP_SERVICE_NAME }}.azurewebsites.net"
          for i in 1 2 3 4 5; do
            HEALTH=$(curl -sf "$APP_URL/api/healthz" 2>/dev/null || echo "")
            if [ -n "$HEALTH" ]; then
              echo "Health check passed: $HEALTH"
              exit 0
            fi
            echo "Attempt $i: waiting for app to start..."
            sleep 10
          done
          echo "Health check failed after 5 attempts"
          exit 1
